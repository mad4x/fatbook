version: '3.8'

services:
  # 1. Database (Resta uguale)
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Backend Spring Boot (NUOVO)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spring-backend
    ports:
      - "8080:8080" # Spring gira sulla 8080 di solito
    depends_on:
      - db
    environment:
      # Spring configura il DB usando queste variabili
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Istruzione per aggiornare le tabelle automaticamente all'avvio
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  # 3. Frontend Next.js (MODIFICATO)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextjs-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

    # QUESTA È LA MODIFICA FONDAMENTALE:
    # Carica tutte le variabili dal file .env dentro il container
    env_file:
      - .env

volumes:
  postgres_data: